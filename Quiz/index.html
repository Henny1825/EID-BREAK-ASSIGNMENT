<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive JavaScript Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="quiz-container">
        <header>
            <h1>JavaScript Master Quiz</h1>
            <div class="high-score-container">Personal Best: <span id="best-score">0</span>/10</div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="quiz-status">
                <span id="question-counter">Question 1 of 10</span>
                <span id="current-score">Score: 0</span>
            </div>
        </header>

        <main id="quiz-body">
            <div id="question-screen">
                <h2 id="question-text">Question placeholder text</h2>
                <div class="options-grid" id="options-container"></div>
            </div>

            <div id="result-screen" class="hidden">
                <h2>Quiz Complete!</h2>
                <p class="final-score-text">You scored <span id="final-score">0</span> out of 10</p>
                <div id="review-container"></div>
                <button id="restart-btn">Try Again</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
